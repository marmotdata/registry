<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.ico" type="image/x-icon" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="description" content="A registry of plugins for Marmot — the open-source data catalog." />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
			rel="stylesheet"
		/>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover" class="bg-earthy-brown-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100">
		<div style="display: contents">%sveltekit.body%</div>

		<script>
			(() => {
				const saved = localStorage.getItem('theme');
				const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
				const theme = saved ? saved : prefersDark ? 'dark' : 'light';
				if (theme === 'dark') document.documentElement.classList.add('dark');
			})();
		</script>
	</body>
</html>
