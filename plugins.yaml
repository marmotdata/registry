# Marmot Plugin Registry — source of truth.
#
# Human-editable. Run `pnpm build` (or `node scripts/build.mjs`) to regenerate
# plugins.json, which is what external apps consume.

schema_version: 1

# Default OCI registry for plugins that don't override with their own `oci`
# field. The resolved reference for a version is `{oci}/{name}:{version}`.
default_registry: ghcr.io/marmotdata/plugins

plugins:
  - namespace: marmotdata
    name: airflow
    display_name: Airflow
    description: Ingest metadata from Apache Airflow including DAGs, tasks, and dataset lineage
    icon: airflow
    category: orchestration
    official: true
    source: https://github.com/marmotdata/marmot/tree/main/plugins/airflow
